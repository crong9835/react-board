<!doctype html>
<!-- lang 을 ko 로 두면 브라우저가 한국어 문서로 인식해 줄바꿈 등을 알맞게 처리합니다. -->
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 한글 웹폰트 Pretendard.
         preconnect 는 "이 주소에서 곧 파일을 받아올 거야"라고 브라우저에 미리
         알려주는 것으로, 연결 준비를 앞당겨 폰트가 조금 더 빨리 뜹니다.
         dynamic-subset 은 화면에 실제로 쓰인 글자만 골라 받아 용량이 작습니다. -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />

    <!-- 브라우저 탭에 뜨는 이름입니다. 헤더 로고와 같은 이름으로 맞춰둡니다. -->
    <title>와이라누</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
