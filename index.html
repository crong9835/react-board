<!doctype html>
<!-- lang 을 ko 로 두면 브라우저가 한국어 문서로 인식해 줄바꿈 등을 알맞게 처리합니다. -->
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 검색 결과에 제목 아래로 뜨는 한 줄 설명입니다. -->
    <meta
      name="description"
      content="와이라누 - 회원가입 후 자유롭게 글을 쓰고 소통하는 커뮤니티 게시판입니다."
    />

    <!-- 오픈그래프(OG) 태그.
         카카오톡·슬랙 등에 링크를 붙였을 때 뜨는 미리보기 카드를 채워줍니다.
         이 태그가 없으면 미리보기가 빈 상태로 나옵니다.
         og:image 와 og:url 은 절대주소(https://...)여야 카카오·슬랙이 제대로 읽습니다. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="와이라누" />
    <meta property="og:title" content="와이라누" />
    <meta
      property="og:description"
      content="회원가입 후 자유롭게 글을 쓰고 소통하는 커뮤니티 게시판입니다."
    />
    <meta property="og:url" content="https://react-board-psi.vercel.app/" />
    <meta
      property="og:image"
      content="https://react-board-psi.vercel.app/og-image.png"
    />
    <meta property="og:locale" content="ko_KR" />

    <!-- 트위터(X)용 미리보기. OG 값을 그대로 재사용합니다. -->
    <meta name="twitter:card" content="summary" />

    <!-- 한글 웹폰트 Pretendard.
         preconnect 는 "이 주소에서 곧 파일을 받아올 거야"라고 브라우저에 미리
         알려주는 것으로, 연결 준비를 앞당겨 폰트가 조금 더 빨리 뜹니다.
         dynamic-subset 은 화면에 실제로 쓰인 글자만 골라 받아 용량이 작습니다. -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />

    <!-- 브라우저 탭에 뜨는 이름입니다. 헤더 로고와 같은 이름으로 맞춰둡니다. -->
    <title>와이라누</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
